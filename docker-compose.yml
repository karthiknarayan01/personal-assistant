services:
  shopping_agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "sub_agents.shopping_agent.server:a2a_app", "--host", "0.0.0.0", "--port", "8003"]
    env_file:
      - orchestrator/.env
    environment:
      A2A_HOST: shopping_agent
      # Ollama runs on the host, not in compose — reach it via Docker
      # Desktop's host gateway (Mac/Windows only; add extra_hosts on Linux).
      OLLAMA_API_BASE: http://host.docker.internal:11434
    volumes:
      - ./sub_agents/shopping_agent/data:/app/sub_agents/shopping_agent/data
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/.well-known/agent-card.json', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20

  remedy_agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "sub_agents.remedy_agent.server:a2a_app", "--host", "0.0.0.0", "--port", "8004"]
    env_file:
      - orchestrator/.env
    environment:
      A2A_HOST: remedy_agent
      OLLAMA_API_BASE: http://host.docker.internal:11434
    volumes:
      - ./sub_agents/remedy_agent/data:/app/sub_agents/remedy_agent/data
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/.well-known/agent-card.json', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    # --allow_origins must match the frontend's origin as seen by the
    # browser (see the `frontend` service below) — CORS is enforced by
    # the browser, not by container-to-container networking, so this
    # can't be templated through orchestrator/.env (Compose's exec-form
    # command arrays don't get shell variable expansion).
    command: ["adk", "web", "--host", "0.0.0.0", "--port", "8000", "--allow_origins", "http://localhost:8080"]
    env_file:
      - orchestrator/.env
    environment:
      # Overrides the localhost defaults so the orchestrator reaches
      # sub-agents by their compose service name instead.
      SHOPPING_AGENT_CARD_URL: http://shopping_agent:8003/.well-known/agent-card.json
      REMEDY_AGENT_CARD_URL: http://remedy_agent:8004/.well-known/agent-card.json
      OLLAMA_API_BASE: http://host.docker.internal:11434
    ports:
      - "8000:8000"
    depends_on:
      shopping_agent:
        condition: service_healthy
      remedy_agent:
        condition: service_healthy

  frontend:
    image: python:3.12-slim
    working_dir: /app
    command: ["python3", "-m", "http.server", "8080", "--directory", "/app"]
    volumes:
      - ./frontend:/app:ro
    ports:
      - "8080:8080"
    depends_on:
      - orchestrator
